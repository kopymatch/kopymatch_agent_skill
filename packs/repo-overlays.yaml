name: repo-overlays
version: "2.0.0"
description: "11 skill dev đã Việt hoá — React, testing, security, workflow"
target_agents:
  - antigravity
  - codex

skills:
  - name: react-best-practices
    path: repo-overlays/react-best-practices
    description: "57 rules tối ưu React/Next.js"
